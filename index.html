<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🏁 Course d’Orientation EPS</title>

<!-- ✅ SheetJS (XLSX) : nécessaire pour importer/exporter Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Inter,system-ui,Segoe UI,sans-serif;
  background:linear-gradient(135deg,#0b3d2e,#145a32);
  color:#ecf0f1;
}
.container{max-width:1200px;margin:auto;padding:24px}
h1{text-align:center;margin-bottom:24px}

.card{
  background:rgba(255,255,255,.12);
  border-radius:20px;
  padding:22px;
  margin-bottom:26px;
}

.flex{display:flex;gap:16px;flex-wrap:wrap;align-items:center}

input,select{
  padding:10px 14px;
  border:none;
  border-radius:14px;
  font-size:14px;
}
input.time{width:130px;text-align:center;font-weight:700}
input.num{width:90px;text-align:center}

button{
  padding:10px 18px;
  border-radius:22px;
  border:none;
  background:#2ecc71;
  color:#052015;
  font-weight:700;
  cursor:pointer;
}
button:hover{filter:brightness(1.08)}
button.danger{background:#e74c3c;color:white}
button.secondary{background:rgba(255,255,255,.18);color:#ecf0f1}

.slider{width:240px}

.student{
  display:grid;
  grid-template-columns:
    1.2fr 1.2fr 130px 90px
    110px 90px 80px;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.student-header{
  opacity:.9;
  font-weight:700;
}

table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{padding:10px;text-align:center}
th{background:rgba(0,0,0,.35)}

.toast{
  position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
  background:rgba(0,0,0,.55); color:#fff;
  padding:10px 14px; border-radius:14px;
  opacity:0; pointer-events:none; transition:opacity .18s ease;
  font-weight:600; font-size:14px;
}
.toast.show{opacity:1}
</style>
</head>

<body>
<div class="container">

<h1>🏁 Course d’Orientation EPS</h1>

<!-- COURSES -->
<div class="card flex">
  <select id="courseSelect"></select>
  <input id="courseName" placeholder="Nom de la course" />
  <button id="btnAddCourse">Nouvelle course</button>
  <button class="danger" id="btnDeleteCourse">Supprimer</button>
</div>

<!-- PARAMÈTRES -->
<div class="card">
  <h3>⚙️ Paramètres</h3>

  <div class="flex">
    <label>Total de balises</label>
    <input type="range" min="1" max="120" class="slider" id="totalBalises" />
    <span id="totalBalisesVal"></span>
  </div>

  <div class="flex">
    <label>Pénalité balise manquante (min)</label>
    <input type="range" min="0" max="120" class="slider" id="penBalise" />
    <span id="penBaliseVal"></span>
  </div>

  <div class="flex">
    <label>Temps limite (min)</label>
    <input type="range" min="1" max="240" class="slider" id="tempsLimite" />
    <span id="tempsLimiteVal"></span>
  </div>

  <div class="flex">
    <label>Pénalité par minute de retard</label>
    <input type="range" min="0" max="120" class="slider" id="penRetard" />
    <span id="penRetardVal"></span>
  </div>
</div>

<!-- ÉLÈVES -->
<div class="card">
  <div class="flex">
    <input id="nom" placeholder="Nom" />
    <input id="prenom" placeholder="Prénom" />
    <button id="btnAddStudent">Ajouter</button>

    <button id="btnImport" class="secondary">Importer Excel / CSV</button>
    <input id="fileInput" type="file" hidden accept=".xlsx,.xls,.csv" />

    <button class="danger" id="btnResetStudents">Réinitialiser</button>
  </div>

  <div class="student student-header">
    <div>Nom</div><div>Prénom</div><div>Chrono</div><div>▶️/⏸️</div>
    <div>balise</div><div>✔️</div><div>✖</div>
  </div>

  <div id="students"></div>
</div>

<!-- CLASSEMENT -->
<div class="card">
  <div class="flex">
    <button id="btnExportCSV">Exporter CSV</button>
    <button id="btnExportXLSX" class="secondary">Exporter Excel</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th><th>Nom</th><th>Prénom</th>
        <th>balise</th><th>Temps</th><th>Temps corrigé</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ================== CONFIG / ÉTAT ================== */
const STORAGE = "CO_EPS_ULTRA_STABLE_NO_LEURRE_V2";
let courses = [];
let current = 0;

/* ================== HELPERS DOM ================== */
const $ = (id) => document.getElementById(id);

function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(()=>t.classList.remove("show"), 1600);
}

/* ================== UTILS ================== */
function escapeHtml(str){
  return String(str ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function format(ms){
  const s = Math.floor((ms||0)/1000);
  const hh = String(Math.floor(s/3600)).padStart(2,'0');
  const mm = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}

function parseTimeToMs(txt){
  const parts = String(txt||"").trim().split(":");
  if(parts.length !== 3) return null;
  const [h,m,s] = parts.map(Number);
  if([h,m,s].some(n=>Number.isNaN(n) || n<0)) return null;
  return (h*3600 + m*60 + s) * 1000;
}

function makeId(){
  if (window.crypto?.randomUUID) return crypto.randomUUID();
  return Date.now()+"_"+Math.random().toString(16).slice(2);
}

/* ================== PERSISTENCE ================== */
function save(){
  const payload = { courses, current };
  // on évite de stocker les timers
  const json = JSON.stringify(payload, (k,v)=>{
    if(k==="interval" || k==="startEpoch") return undefined;
    return v;
  });
  localStorage.setItem(STORAGE, json);
}

function load(){
  const d = localStorage.getItem(STORAGE);
  if(!d) return;
  try{
    const obj = JSON.parse(d);
    courses = obj.courses || [];
    current = obj.current || 0;
  }catch(e){
    courses = [];
    current = 0;
  }

  // sécurité : au rechargement, on ne relance pas automatiquement
  for(const c of courses){
    for(const s of Object.values(c.students||{})){
      s.run = false;
      s.interval = null;
      s.startEpoch = 0;
      s.editing = false;
    }
  }
}

/* ================== MODÈLES ================== */
function newCourse(name){
  return {
    name,
    params: { totalBalises:10, penBalise:5, tempsLimite:30, penRetard:5 },
    students: {}
  };
}

function newStudent(nom, prenom){
  return {
    nom, prenom,
    time: 0,
    startEpoch: 0,
    run: false,
    interval: null,
    editing: false,
    bal: 0,
    corrected: null
  };
}

/* ================== COURSES ================== */
function addCourse(){
  courses.push(newCourse("Course "+(courses.length+1)));
  current = courses.length-1;
  refreshCourses();
  toast("Course créée");
}

function refreshCourses(){
  const sel = $("courseSelect");
  sel.innerHTML = "";
  courses.forEach((c,i)=>{
    const o = document.createElement("option");
    o.value = i;
    o.textContent = c.name;
    sel.appendChild(o);
  });
  sel.value = String(current);
  loadCourse();
  save();
}

function deleteCourse(){
  if(!confirm("Supprimer la course ?")) return;

  // stop timers uniquement de la course supprimée
  stopCourseTimers(current);

  courses.splice(current,1);
  if(!courses.length){
    courses.push(newCourse("Course 1"));
    current = 0;
  }else{
    current = Math.max(0, current-1);
  }
  refreshCourses();
  toast("Course supprimée");
}

$("courseSelect").addEventListener("change", ()=>{
  current = +$("courseSelect").value;
  loadCourse();
  save();
});

$("courseName").addEventListener("input", ()=>{
  const v = $("courseName").value || `Course ${current+1}`;
  courses[current].name = v;
  // MAJ uniquement du texte option, sans recharger tout
  const sel = $("courseSelect");
  if(sel.options[current]) sel.options[current].textContent = v;
  save();
});

/* ================== PARAMÈTRES ================== */
const PARAM_KEYS = ["totalBalises","penBalise","tempsLimite","penRetard"];
for(const k of PARAM_KEYS){
  $(k).addEventListener("input", (e)=>{
    courses[current].params[k] = +e.target.value;
    $(k+"Val").textContent = e.target.value;
    save();
  });
}

function loadCourse(){
  const c = courses[current];
  $("courseName").value = c.name;

  for(const k of PARAM_KEYS){
    $(k).value = c.params[k];
    $(k+"Val").textContent = c.params[k];
  }
  renderStudents();
  renderResults();
}

/* ================== ÉLÈVES ================== */
function addStudent(){
  const n = $("nom").value.trim();
  const p = $("prenom").value.trim();
  if(!n || !p) return;

  const id = makeId();
  courses[current].students[id] = newStudent(n,p);

  $("nom").value = "";
  $("prenom").value = "";
  renderStudents();
  save();
}

function resetStudents(){
  if(!confirm("Réinitialiser tous les élèves de cette course ?")) return;
  stopCourseTimers(current);
  courses[current].students = {};
  renderStudents();
  renderResults();
  save();
  toast("Élèves réinitialisés");
}

function removeStudent(id){
  stopTimer(id);
  delete courses[current].students[id];
  renderStudents();
  renderResults();
  save();
}

function renderStudents(){
  const wrap = $("students");
  wrap.innerHTML = "";
  const frag = document.createDocumentFragment();

  for(const [id,s] of Object.entries(courses[current].students)){
    const row = document.createElement("div");
    row.className = "student";
    row.innerHTML = `
      <input value="${escapeHtml(s.nom)}"
        data-id="${id}" data-field="nom" />
      <input value="${escapeHtml(s.prenom)}"
        data-id="${id}" data-field="prenom" />
      <input id="time-${id}" class="time" value="${format(s.time)}"
        data-id="${id}" data-field="time" />
      <button id="btn-${id}" data-action="toggle" data-id="${id}">${s.run ? "⏸️" : "▶️"}</button>
      <input class="num" type="number" min="0" max="120" value="${s.bal}"
        data-id="${id}" data-field="bal" />
      <button data-action="save" data-id="${id}">✔️</button>
      <button class="danger" data-action="remove" data-id="${id}">✖</button>
    `;
    frag.appendChild(row);
  }

  wrap.appendChild(frag);
}

/* ✅ Event delegation : performance + fiabilité */
$("students").addEventListener("click", (e)=>{
  const btn = e.target.closest("button");
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if(!action || !id) return;

  if(action==="toggle") toggle(id);
  else if(action==="save") saveStudent(id);
  else if(action==="remove") removeStudent(id);
});

$("students").addEventListener("input", (e)=>{
  const el = e.target;
  const id = el.dataset.id;
  const field = el.dataset.field;
  if(!id || !field) return;

  const s = courses[current].students[id];
  if(!s) return;

  if(field==="nom") s.nom = el.value;
  else if(field==="prenom") s.prenom = el.value;
  else if(field==="bal") s.bal = Math.max(0, +el.value || 0);

  // on ne parse pas l'heure ici (on attend blur)
  save();
});

/* Bloquer l'auto-update pendant édition + parse time au blur */
$("students").addEventListener("focusin", (e)=>{
  const el = e.target;
  if(el.classList.contains("time")){
    const id = el.dataset.id;
    const s = courses[current].students[id];
    if(s) s.editing = true;
  }
});

$("students").addEventListener("focusout", (e)=>{
  const el = e.target;
  if(el.classList.contains("time")){
    const id = el.dataset.id;
    const s = courses[current].students[id];
    if(!s) return;

    s.editing = false;
    const ms = parseTimeToMs(el.value);
    if(ms===null){
      el.value = format(s.time);
    }else{
      s.time = ms;
      if(s.run){
        // recalage
        s.startEpoch = Date.now() - s.time;
      }
    }
    save();
  }
});

/* ================== CHRONO (fiable + performant) ================== */
/* On utilise un SEUL ticker global qui met à jour tous les chronos */
let tickerRunning = false;

function ensureTicker(){
  if(tickerRunning) return;
  tickerRunning = true;

  const tick = () => {
    // update logique pour tous les élèves en run
    for(const c of courses){
      for(const s of Object.values(c.students||{})){
        if(s.run){
          s.time = Date.now() - s.startEpoch;
        }
      }
    }

    // update UI uniquement pour la course affichée, si input existe
    const currentStudents = courses[current]?.students || {};
    for(const [id,s] of Object.entries(currentStudents)){
      const input = document.getElementById(`time-${id}`);
      if(input && !s.editing){
        input.value = format(s.time);
      }
      const btn = document.getElementById(`btn-${id}`);
      if(btn){
        const should = s.run ? "⏸️" : "▶️";
        if(btn.textContent !== should) btn.textContent = should;
      }
    }

    // continuer tant qu'il y a au moins un chrono qui tourne
    if(anyTimerRunning()){
      requestAnimationFrame(tick);
    }else{
      tickerRunning = false;
    }
  };

  requestAnimationFrame(tick);
}

function anyTimerRunning(){
  for(const c of courses){
    for(const s of Object.values(c.students||{})){
      if(s.run) return true;
    }
  }
  return false;
}

function toggle(id){
  const s = courses[current].students[id];
  if(!s) return;

  if(!s.run){
    s.startEpoch = Date.now() - (s.time||0);
    s.run = true;
    ensureTicker();
  }else{
    stopTimer(id);
  }
  save();
}

function stopTimer(id){
  // stop uniquement l'élève de la course actuelle
  const s = courses[current].students[id];
  if(!s) return;
  s.run = false;
  save();
}

function stopCourseTimers(courseIndex){
  const c = courses[courseIndex];
  if(!c) return;
  for(const s of Object.values(c.students||{})){
    s.run = false;
  }
  save();
}

/* ================== CALCUL / VALIDATION ================== */
function saveStudent(id){
  // stop seulement CE chrono
  const s = courses[current].students[id];
  if(!s) return;
  s.run = false;

  const p = courses[current].params;
  let t = s.time;

  // retard
  const limitMs = p.tempsLimite * 60000;
  if(t > limitMs){
    const overtimeMin = Math.ceil((t - limitMs) / 60000);
    t += overtimeMin * p.penRetard * 60000;
  }

  // balises manquantes
  const missing = Math.max(0, p.totalBalises - (s.bal||0));
  t += missing * p.penBalise * 60000;

  s.corrected = t;

  renderResults();
  save();
  toast("Résultat enregistré");
}

/* ================== RÉSULTATS ================== */
function renderResults(){
  const body = $("results");
  body.innerHTML = "";

  const list = Object.values(courses[current].students)
    .filter(s => s.corrected != null)
    .sort((a,b)=>a.corrected - b.corrected);

  for(let i=0;i<list.length;i++){
    const s = list[i];
    const r = body.insertRow();
    r.innerHTML = `
      <td>${i+1}</td>
      <td>${escapeHtml(s.nom)}</td>
      <td>${escapeHtml(s.prenom)}</td>
      <td>${s.bal ?? 0}</td>
      <td>${format(s.time)}</td>
      <td>${format(s.corrected)}</td>
    `;
  }
}

/* ================== IMPORT CSV / EXCEL (robuste) ================== */
$("btnImport").addEventListener("click", ()=> $("fileInput").click());

$("fileInput").addEventListener("change", (e)=>{
  const file = e.target.files?.[0];
  if(!file) return;

  const name = (file.name||"").toLowerCase();
  if(name.endsWith(".csv")){
    importCSV(file);
  }else if(name.endsWith(".xlsx") || name.endsWith(".xls")){
    importXLSX(file);
  }else{
    alert("Format non supporté : .xlsx .xls .csv");
  }

  // reset input pour permettre réimport du même fichier
  e.target.value = "";
});

function importCSV(file){
  const reader = new FileReader();
  reader.onload = () => {
    const text = String(reader.result||"");
    const rows = parseCSVSmart(text);
    addStudentsFromRows(rows);
  };
  reader.readAsText(file, "utf-8");
}

function importXLSX(file){
  if(typeof XLSX === "undefined"){
    alert("La librairie Excel (SheetJS) n’est pas chargée. Vérifie le script CDN / ta connexion.");
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const data = ev.target.result;
    const wb = XLSX.read(data, { type:"array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, blankrows:false });
    addStudentsFromRows(rows);
  };
  reader.readAsArrayBuffer(file);
}

function parseCSVSmart(text){
  let t = String(text||"").replace(/^\uFEFF/,"");
  const lines = t.split(/\r?\n/).filter(l=>l.trim()!=="");
  if(!lines.length) return [];

  const first = lines[0];
  const seps = [";","\,","\t",","];
  let sep=";", best=-1;
  for(const c of [";","\t",","]){
    const count = (first.match(new RegExp(escapeRegExp(c), "g"))||[]).length;
    if(count > best){ best = count; sep = c; }
  }
  return lines.map(l=>l.split(sep).map(x=>String(x??"").trim()));
}
function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

function addStudentsFromRows(rows){
  if(!Array.isArray(rows) || !rows.length){
    alert("Fichier vide.");
    return;
  }

  // normalisation simple
  const norm = (v)=>String(v??"").trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"");

  // détecter colonnes "nom" et "prenom" si header
  let headerIndex = -1;
  let colNom = 0, colPrenom = 1;

  for(let i=0;i<Math.min(rows.length,10);i++){
    const r = (rows[i]||[]).map(norm);
    const n = r.findIndex(x=>x==="nom" || x.includes("nom"));
    const p = r.findIndex(x=>x==="prenom" || x.includes("prenom"));
    if(n !== -1 && p !== -1){
      headerIndex = i;
      colNom = n;
      colPrenom = p;
      break;
    }
  }

  const start = headerIndex === -1 ? 0 : headerIndex + 1;
  let added = 0;

  for(let i=start; i<rows.length; i++){
    const r = rows[i] || [];
    let n = String(r[colNom] ?? "").trim();
    let p = String(r[colPrenom] ?? "").trim();

    // fallback : si une seule colonne "Nom Prénom"
    if((!n || !p) && r.length === 1){
      const parts = String(r[0]??"").trim().split(/\s+/);
      if(parts.length >= 2){
        n = parts[0];
        p = parts.slice(1).join(" ");
      }
    }

    if(!n || !p) continue;

    const id = makeId();
    courses[current].students[id] = newStudent(n,p);
    added++;
  }

  renderStudents();
  save();
  toast(`${added} élève(s) importé(s)`);
}

/* ================== EXPORT CSV / EXCEL ================== */
$("btnExportCSV").addEventListener("click", exportCSV);
$("btnExportXLSX").addEventListener("click", exportXLSX);

function exportCSV(){
  let csv = "\uFEFFClassement;Nom;Prénom;balise;Temps;Temps corrigé\n";
  const rows = $("results").rows;
  for(const r of rows){
    csv += [...r.cells].map(c=>c.innerText).join(";") + "\n";
  }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type:"text/csv;charset=utf-8;" }));
  a.download = "resultats.csv";
  a.click();
}

function exportXLSX(){
  if(typeof XLSX === "undefined"){
    alert("La librairie Excel (SheetJS) n’est pas chargée. Vérifie le script CDN / ta connexion.");
    return;
  }

  // Feuille 1 : Classement
  const classement = [["#", "Nom", "Prénom", "balise", "Temps", "Temps corrigé"]];
  const list = Object.values(courses[current].students)
    .filter(s => s.corrected != null)
    .sort((a,b)=>a.corrected - b.corrected);

  list.forEach((s,i)=>{
    classement.push([i+1, s.nom, s.prenom, s.bal ?? 0, format(s.time), format(s.corrected)]);
  });

  // Feuille 2 : Élèves (tous)
  const eleves = [["Nom","Prénom","balise","Temps","En cours ?"]];
  for(const s of Object.values(courses[current].students)){
    eleves.push([s.nom, s.prenom, s.bal ?? 0, format(s.time), s.run ? "oui" : "non"]);
  }

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(classement);
  const ws2 = XLSX.utils.aoa_to_sheet(eleves);

  XLSX.utils.book_append_sheet(wb, ws1, "Classement");
  XLSX.utils.book_append_sheet(wb, ws2, "Eleves");

  const safeName = (courses[current].name || "course").slice(0,30).replace(/[\\/:*?"<>|]/g,"_");
  XLSX.writeFile(wb, `resultats_${safeName}.xlsx`);
}

/* ================== BOUTONS TOP ================== */
$("btnAddCourse").addEventListener("click", addCourse);
$("btnDeleteCourse").addEventListener("click", deleteCourse);
$("btnAddStudent").addEventListener("click", addStudent);
$("btnResetStudents").addEventListener("click", resetStudents);

/* ================== INIT ================== */
load();
if(!courses.length){
  courses.push(newCourse("Course 1"));
  current = 0;
}
refreshCourses();
</script>
</body>
</html>
